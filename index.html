```html
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>GlassOS Edge - Remote</title>
    <!-- 核心依赖 -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;900&display=swap');
        body { font-family: 'Inter', sans-serif; background: #000; overflow: hidden; margin: 0; user-select: none; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(25px); border: 1px solid rgba(255, 255, 255, 0.08); }
        .ios-app-card { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .ios-app-card:active { transform: scale(0.9); }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // Lucide 图标适配器
        const Icon = ({ name, size = 24, className = "" }) => {
          const iconRef = useRef(null);
          useEffect(() => {
            if (iconRef.current && window.lucide) {
              const icon = lucide[name] || lucide[name.charAt(0).toUpperCase() + name.slice(1)];
              if (icon) {
                iconRef.current.innerHTML = icon.toSvg({ width: size, height: size, class: className });
              }
            }
          }, [name, size, className]);
          return <span ref={iconRef} className="inline-block" />;
        };

        const App = () => {
          const [activeApp, setActiveApp] = useState(null);
          const [urlInput, setUrlInput] = useState('');
          const [currentUrl, setCurrentUrl] = useState('');
          const [time, setTime] = useState(new Date());

          useEffect(() => {
            const t = setInterval(() => setTime(new Date()), 1000);
            return () => clearInterval(t);
          }, []);

          const launchBrowser = (val) => {
            let target = val.trim();
            if (!target) return;
            if (!target.startsWith('http')) target = 'https://' + target;
            // 这里的 origin 会自动指向当前 Worker 的域名
            const finalUrl = window.location.origin + '/' + target;
            setCurrentUrl(finalUrl);
            setActiveApp('browser');
          };

          const apps = [
            { id: 'browser', name: '浏览器', color: '#10b981', icon: 'Globe' },
            { id: 'notes', name: '记事本', color: '#3b82f6', icon: 'FileText' },
            { id: 'monitor', name: '系统状态', color: '#06b6d4', icon: 'Cpu' },
            { id: 'settings', name: '偏好设置', color: '#64748b', icon: 'Settings' }
          ];

          return (
            <div className="fixed inset-0 bg-gradient-to-br from-zinc-900 to-black text-white overflow-hidden">
              {/* 状态栏 */}
              <div className="flex justify-between px-6 py-2 text-[11px] font-bold">
                <span>{time.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})}</span>
                <div className="flex gap-2 items-center">
                  <Icon name="Wifi" size={12} />
                  <Icon name="Battery" size={12} />
                </div>
              </div>

              {/* 桌面 */}
              <div className="grid grid-cols-4 gap-6 p-8 mt-4">
                {apps.map(app => (
                  <div key={app.id} onClick={() => setActiveApp(app.id)} className="flex flex-col items-center gap-2 cursor-pointer ios-app-card">
                    <div className="w-16 h-16 rounded-2xl flex items-center justify-center shadow-2xl" style={{ backgroundColor: app.color }}>
                      <Icon name={app.icon} size={30} />
                    </div>
                    <span className="text-[10px] font-medium opacity-70">{app.name}</span>
                  </div>
                ))}
              </div>

              {/* 底部 Dock */}
              <div className="absolute bottom-8 left-0 w-full flex justify-center px-4">
                <div className="glass p-3 rounded-[30px] flex gap-4">
                  {apps.map(app => (
                    <div key={app.id} onClick={() => setActiveApp(app.id)} className="w-12 h-12 rounded-xl flex items-center justify-center" style={{ backgroundColor: app.color }}>
                      <Icon name={app.icon} size={22} />
                    </div>
                  ))}
                </div>
              </div>

              {/* 应用窗口 */}
              {activeApp && (
                <div className="fixed inset-0 z-50 bg-black flex flex-col animate-in slide-in-from-bottom duration-300 rounded-t-3xl overflow-hidden shadow-2xl">
                  <div className="h-12 flex items-center justify-between px-6 bg-zinc-900/50 border-b border-white/5">
                    <button onClick={() => setActiveApp(null)} className="text-emerald-400 text-sm font-bold flex items-center">
                      <Icon name="ChevronLeft" size={20} /> 返回
                    </button>
                    <span className="text-[10px] font-black uppercase tracking-widest opacity-50">GlassOS</span>
                    <div className="w-10"></div>
                  </div>
                  <div className="flex-1">
                    {activeApp === 'browser' && (
                      <div className="h-full flex flex-col bg-white">
                        <div className="p-2 bg-zinc-100 flex gap-2">
                          <input 
                            className="flex-1 px-4 py-1 rounded-full border border-zinc-300 text-zinc-900 text-sm outline-none"
                            placeholder="输入网址..."
                            value={urlInput}
                            onChange={(e) => setUrlInput(e.target.value)}
                            onKeyDown={(e) => e.key === 'Enter' && launchBrowser(urlInput)}
                          />
                        </div>
                        <iframe src={currentUrl} className="flex-1 w-full border-none" />
                      </div>
                    )}
                    {activeApp !== 'browser' && (
                      <div className="p-10 text-zinc-500 text-center">正在加载模块...</div>
                    )}
                  </div>
                  <div className="h-8 bg-black flex justify-center items-center" onClick={() => setActiveApp(null)}>
                    <div className="w-24 h-1 bg-white/10 rounded-full" />
                  </div>
                </div>
              )}
            </div>
          );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>

```
